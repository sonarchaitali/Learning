<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learning</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef2ff;
      color: #111827;
    }
    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 36px;
      max-width: 680px;
      width: 100%;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
      text-align: center;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 2.5rem;
      color: #1e293b;
    }
    p {
      margin: 0 0 24px;
      line-height: 1.75;
      color: #475569;
    }
    a.button {
      display: inline-block;
      padding: 14px 26px;
      border-radius: 999px;
      background: #4f46e5;
      color: white;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s ease;
    }
    a.button:hover {
      background: #4338ca;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>Welcome to Learning</h1>
      <p>Explore resources, build your skills, and get in touch if you have questions or need support.</p>
      <div style="display: flex; flex-wrap: wrap; gap: 14px; justify-content: center;">
        <a class="button" href="about.html">About Us</a>
        <a class="button" href="contact.html">Contact Us</a>
      </div>
    </div>
  </div>
</body>
</html>
